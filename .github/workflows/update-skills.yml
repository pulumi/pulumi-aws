# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/pulumi/ci-mgmt

name: Update skills

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  id-token: write # For ESC secrets.

jobs:
  update-skills:
    name: Update skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for skills lockfile
        id: skills-lock
        run: |
          if [ -f skills-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update skills
        if: steps.skills-lock.outputs.exists == 'true'
        run: npx --yes skills@1.5.16 update -y

      - env:
          ESC_ACTION_ENVIRONMENT: github-secrets/${{ github.repository_owner }}-${{ github.event.repository.name }}
          ESC_ACTION_EXPORT_ENVIRONMENT_VARIABLES: "false"
          ESC_ACTION_OIDC_AUTH: "true"
          ESC_ACTION_OIDC_ORGANIZATION: pulumi
          ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
        id: esc-secrets
        name: Fetch secrets from ESC
        uses: pulumi/esc-action@9eb774255b1a4afb7855678ae8d4a77359da0d9b

      - name: Create pull request
        if: steps.skills-lock.outputs.exists == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: |
            .agents/skills
            .claude/skills
            skills-lock.json
          author: Pulumi Bot <bot@pulumi.com>
          branch: update-skills
          commit-message: "[internal] Update repository skills"
          committer: Pulumi Bot <bot@pulumi.com>
          delete-branch: true
          labels: "impact/no-changelog-required"
          title: "Update repository skills"
          token: ${{ steps.esc-secrets.outputs.PULUMI_BOT_TOKEN }}
          body: |
            This PR updates repository skills by running:

            ```sh
            npx --yes skills@1.5.16 update -y
            ```
